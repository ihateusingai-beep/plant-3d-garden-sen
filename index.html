<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌿 3D植物園 - Test</title>
  <style>
    body { margin:0; background:#0a0a0a; overflow:hidden; }
    #status { position:fixed; top:20px; left:20px; color:#fff; background:#222; padding:10px 16px; border-radius:8px; font-size:14px; }
  </style>
</head>
<body>
  <div id="status">載入中...</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

  <script>
    const status = document.getElementById('status');

    try {
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0a0a0a);

      const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(4, 3, 5);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer);

      // Simple test cube
      const geometry = new THREE.BoxGeometry(2, 2, 2);
      const material = new THREE.MeshLambertMaterial({ color: 0x4ade80 });
      const cube = new THREE.Mesh(geometry, material);
      scene.add(cube);

      // Light
      scene.add(new THREE.AmbientLight(0xffffff, 0.6));
      const light = new THREE.DirectionalLight(0xffffff, 1);
      light.position.set(10, 20, 10);
      scene.add(light);

      function animate() {
        requestAnimationFrame(animate);
        cube.rotation.y += 0.01;
        renderer.render(scene, camera);
      }
      animate();

      status.innerHTML = '✅ WebGL 正常運作<br>如果仲係黑屏，可能是 Safari 設定問題';
      status.style.background = '#166534';

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      console.log('%c[3D Test] Minimal Three.js r134 working', 'color:#4ade80');

    } catch (e) {
      status.innerHTML = '❌ 錯誤: ' + e.message;
      status.style.background = '#7f1d1d';
      console.error(e);
    }
  </script>
</body>
</html>
