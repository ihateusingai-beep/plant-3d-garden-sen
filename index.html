<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌿 3D植物園 - Test</title>
  <style>
    body { margin:0; background:#0a0a0a; overflow:hidden; font-family: system-ui; }
    #status { position:fixed; top:20px; left:20px; color:#fff; background:#222; padding:12px 20px; border-radius:10px; font-size:15px; z-index:100; }
  </style>
</head>
<body>
  <div id="status">載入 Three.js 中...</div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.min.js"></script>

  <script>
    const status = document.getElementById('status');

    function init() {
      try {
        if (typeof THREE === 'undefined') {
          throw new Error('Three.js 載入失敗');
        }

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(4, 3, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);

        // This is the line that was failing
        document.body.appendChild(renderer);

        // Test cube
        const geometry = new THREE.BoxGeometry(2, 2, 2);
        const material = new THREE.MeshLambertMaterial({ color: 0x4ade80 });
        const cube = new THREE.Mesh(geometry, material);
        scene.add(cube);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(10, 20, 10);
        scene.add(light);

        function animate() {
          requestAnimationFrame(animate);
          cube.rotation.y += 0.012;
          renderer.render(scene, camera);
        }
        animate();

        status.innerHTML = '✅ Three.js r134 正常運作<br>綠色正方體應該出現';
        status.style.background = '#166534';

        window.addEventListener('resize', () => {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        });

      } catch (e) {
        status.innerHTML = '❌ 錯誤: ' + e.message + '<br>請檢查網絡或試 Chrome';
        status.style.background = '#7f1d1d';
        console.error(e);
      }
    }

    // Wait for DOM
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
</html>
